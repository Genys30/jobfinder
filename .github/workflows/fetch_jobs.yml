"on":
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC = 06:00 Israel time (IDT)
  workflow_dispatch:
name: Fetch Jobs (Comeet + Greenhouse)
jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright curl_cffi
          playwright install chromium --with-deps
      - name: Fetch all jobs
        run: python fetch_jobs.py
      - name: Merge to jobs.json
        run: python merge_jobs.py
      - name: Commit CSVs to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json history.csv || true
          git add *.csv || true
          git diff --staged --quiet || git commit -m "chore: jobs update $(date -u +%Y-%m-%d)"
          git push
