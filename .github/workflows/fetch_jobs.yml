"on":
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC = 06:00 Israel time (IDT)
  workflow_dispatch:
name: Fetch Jobs (Comeet + Greenhouse)
jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright curl_cffi
          playwright install chromium --with-deps
      - name: Fetch all jobs
        run: python fetch_jobs.py
      - name: Merge to jobs.json
        run: python merge_jobs.py
      - name: Commit CSVs to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            jobs.json \
            comeet_jobs_*.csv \
            greenhouse_jobs_*.csv \
            lever_jobs_*.csv \
            ashby_jobs_*.csv \
            workable_jobs_*.csv \
            mitam_jobs_*.csv \
            weizmann_jobs_*.csv \
            bgu_jobs_*.csv \
            huji_alumni_jobs_*.csv \
            huji_positions_*.csv \
            technion_jobs_*.csv \
            tau_jobs_*.csv \
            haifa_jobs_*.csv \
            kpmg_jobs_*.csv \
            deloitte_jobs_*.csv \
            ey_jobs_*.csv \
            joint_
